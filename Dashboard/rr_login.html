<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rajasthan Royals — Access</title>
    <style>
      :root {
        --rr-pink:       #644a40;
        --rr-pink-light: #66493e;
        --rr-pink-glow:  rgba(100, 74, 64, 0.35);
        --rr-pink-dim:   rgba(100, 74, 64, 0.15);
        --rr-blue:       #42382e;
        --rr-dark:       #f9f9f9;
        --rr-dark-2:     #fbfbfb;
        --rr-card:       #fcfcfc;
        --rr-text:       #202020;
        --rr-muted:      #646464;
        --rr-border:     #d8d8d8;
        --display: "Trebuchet MS", "Arial Narrow", sans-serif;
        --ui: "Segoe UI", system-ui, sans-serif;
      }

      .dark {
        --rr-pink:       #ffe0c2;
        --rr-pink-light: #ffe0c1;
        --rr-pink-glow:  rgba(255, 224, 194, 0.35);
        --rr-pink-dim:   rgba(255, 224, 194, 0.15);
        --rr-blue:       #393028;
        --rr-dark:       #111111;
        --rr-dark-2:     #191919;
        --rr-card:       #191919;
        --rr-text:       #eeeeee;
        --rr-muted:      #b4b4b4;
        --rr-border:     #201e18;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: var(--ui);
        background: var(--rr-dark);
        color: var(--rr-text);
        background-image:
          radial-gradient(ellipse 70% 50% at 50% 0%, rgba(100,74,64,0.12), transparent),
          radial-gradient(ellipse 50% 40% at 80% 70%, rgba(255,223,181,0.22), transparent);
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      /* ── Card ───────────────────────────────────────────────── */
      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--rr-card);
        border: 1px solid var(--rr-border);
        border-radius: 24px;
        padding: 44px 40px;
        box-shadow:
          0 0 60px rgba(100,74,64,0.1),
          0 32px 80px rgba(0,0,0,0.6);
        position: relative;
        overflow: hidden;
      }

      .login-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--rr-pink), var(--rr-blue));
      }

      /* ── Logo ───────────────────────────────────────────────── */
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 36px;
        gap: 14px;
      }

      .rr-monogram {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--rr-pink), var(--rr-pink-light));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-size: 1.7rem;
        font-weight: 900;
        color: white;
        letter-spacing: -0.04em;
        box-shadow: 0 0 28px var(--rr-pink-glow);
      }

      .logo-title {
        text-align: center;
      }

      .logo-title h1 {
        font-family: var(--display);
        font-size: 1.25rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        color: var(--rr-text);
        margin-bottom: 4px;
      }

      .logo-title p {
        font-size: 0.72rem;
        color: var(--rr-muted);
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      /* ── Form ───────────────────────────────────────────────── */
      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--rr-muted);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--rr-dark-2);
        border: 1px solid var(--rr-border);
        color: var(--rr-text);
        font-size: 1rem;
        font-family: var(--ui);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        letter-spacing: 0.1em;
      }

      .form-input:focus {
        border-color: var(--rr-pink);
        box-shadow: 0 0 0 3px var(--rr-pink-dim);
      }

      .form-input::placeholder {
        color: var(--rr-muted);
        letter-spacing: 0.3em;
      }

      /* ── Button ─────────────────────────────────────────────── */
      .submit-btn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--rr-pink), var(--rr-pink-light));
        color: white;
        font-weight: 700;
        font-size: 0.92rem;
        letter-spacing: 0.06em;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(100,74,64,0.35);
        transition: all 0.2s;
        font-family: var(--ui);
      }

      .submit-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(100,74,64,0.5);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      /* ── Error ──────────────────────────────────────────────── */
      .error-msg {
        display: none;
        margin-top: 14px;
        padding: 10px 14px;
        border-radius: 10px;
        background: rgba(100,74,64,0.08);
        border: 1px solid var(--rr-border);
        color: var(--rr-pink-light);
        font-size: 0.8rem;
        text-align: center;
      }

      .error-msg.visible { display: block; }

      .status-msg {
        margin-top: 12px;
        min-height: 1.1rem;
        font-size: 0.76rem;
        color: var(--rr-muted);
        text-align: center;
        letter-spacing: 0.03em;
      }

      .status-msg.pending {
        color: var(--rr-text);
      }

      .status-msg.success {
        color: #7ef0c8;
      }

      /* ── Shake animation ────────────────────────────────────── */
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%       { transform: translateX(-8px); }
        40%       { transform: translateX(8px); }
        60%       { transform: translateX(-5px); }
        80%       { transform: translateX(5px); }
      }

      .shake { animation: shake 0.4s ease; }

      /* ── Footer note ────────────────────────────────────────── */
      .access-note {
        margin-top: 28px;
        font-size: 0.7rem;
        color: var(--rr-muted);
        text-align: center;
        line-height: 1.5;
      }

      /* ── Season badge ───────────────────────────────────────── */
      .season-badge {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 0.62rem;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--rr-pink-dim);
        border: 1px solid var(--rr-border);
        color: var(--rr-pink-light);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <span class="season-badge">IPL 2026</span>

      <div class="logo-wrap">
        <div class="rr-monogram">RR</div>
        <div class="logo-title">
          <h1>Rajasthan Royals</h1>
          <p>CreaseIQ · Decision Intelligence Platform</p>
        </div>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="password-input">Access Code</label>
          <input
            id="password-input"
            class="form-input"
            type="password"
            placeholder="••••••••••"
            autofocus
          />
        </div>
        <button class="submit-btn" type="submit">Enter Platform →</button>
        <div class="error-msg" id="error-msg">Incorrect access code. Please try again.</div>
        <div class="status-msg" id="status-msg">Enter the access code to open the RR workspace.</div>
      </form>

      <p class="access-note">
        Restricted access · Rajasthan Royals Analytics Demo<br>
        Contact <strong style="color:var(--rr-text);">piyushzaware</strong> for access
      </p>
    </div>

    <script>
      document.getElementById("login-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const input    = document.getElementById("password-input");
        const errorMsg = document.getElementById("error-msg");
        const statusMsg = document.getElementById("status-msg");
        const btn      = document.querySelector(".submit-btn");

        btn.disabled = true;
        btn.textContent = "Checking…";
        errorMsg.classList.remove("visible");
        statusMsg.className = "status-msg pending";
        statusMsg.textContent = "Checking access and setting secure session…";

        try {
          const res  = await fetch("/api/auth", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: input.value }),
          });
          const data = await res.json();

          if (data.ok) {
            sessionStorage.setItem("rr_demo_auth", "1");
            statusMsg.className = "status-msg success";
            statusMsg.textContent = "Access granted. Redirecting to the RR hub…";
            window.location.replace("./rr_hub.html");
          } else {
            throw new Error(data.error || "wrong code");
          }
        } catch (error) {
          errorMsg.textContent =
            error && error.message && error.message !== "wrong code"
              ? "Unable to verify access right now. Please try again."
              : "Incorrect access code. Please try again.";
          errorMsg.classList.add("visible");
          statusMsg.className = "status-msg";
          statusMsg.textContent = "If this keeps happening, clear site cookies and try again.";
          input.value = "";
          input.focus();
          btn.disabled = false;
          btn.textContent = "Enter Platform →";
          const card = document.querySelector(".login-card");
          card.classList.remove("shake");
          void card.offsetWidth;
          card.classList.add("shake");
        }
      });
    </script>
  </body>
</html>
